<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="НаРязань — маршруты, QR-квесты и билеты по Рязани." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="НаРязань" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/apple-touch-icon.png" />
    <title>НаРязань</title>
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;

        window.addEventListener('load', function () {
          navigator.serviceWorker.getRegistrations()
            .then(function (registrations) {
              return Promise.all(registrations.map(function (registration) {
                return registration.unregister();
              }));
            })
            .then(function () {
              if (!('caches' in window)) return null;
              return caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (key) {
                  return caches.delete(key);
                }));
              });
            })
            .catch(function () {});
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(180deg,#f8fafc 0%,#eff6ff 100%);color:#0f172a;text-align:center;padding:24px;">
        <div>
          <div style="font-size:14px;letter-spacing:.28em;text-transform:uppercase;opacity:.6;">НаРязань</div>
          <div style="font-size:28px;font-weight:800;margin-top:12px;">Загрузка сайта…</div>
          <div style="font-size:15px;line-height:1.6;max-width:360px;margin:12px auto 0;opacity:.75;">
            Если страница не появилась, обновите её один раз или откройте сайт заново.
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
