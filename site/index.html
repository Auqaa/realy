<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
    <meta name="theme-color" content="#e2e8f0" />
    <title>Рязанский квест</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://mapgl.2gis.com/api/js/v1"></script>
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.52);
        --glass-strong: rgba(255, 255, 255, 0.72);
        --glass-border: rgba(255, 255, 255, 0.38);
        --glass-blur: blur(18px) saturate(155%);
        --shadow-soft: 0 8px 32px rgba(31, 56, 88, 0.09);
        --shadow-float: 0 20px 50px rgba(30, 58, 95, 0.12);
        --text: #1e293b;
        --muted: #64748b;
        --accent-grad: linear-gradient(165deg, #5a7186 0%, #3d5368 100%);
      }
      * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      body.app {
        color: var(--text);
        min-height: 100vh;
        letter-spacing: -0.02em;
      }
      body.app::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -2;
        background: linear-gradient(168deg, #f8fafc 0%, #e0f2fe 38%, #dbeafe 72%, #e2e8f0 100%);
      }
      body.app::after {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -1;
        background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920&q=85') center/cover no-repeat;
        opacity: 0.2;
        pointer-events: none;
      }
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow-soft);
      }
      .glass-panel-strong {
        background: var(--glass-strong);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow-float);
      }
      .rounded-card { border-radius: 26px; }
      .rounded-pill { border-radius: 9999px; }
      .hero-radius { border-radius: 32px; }
      .btn-primary {
        padding: 14px 28px;
        border-radius: 9999px;
        background: var(--accent-grad);
        color: #fff;
        font-weight: 500;
        font-size: 15px;
        border: none;
        box-shadow: 0 6px 24px rgba(61, 83, 104, 0.28);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(61, 83, 104, 0.32); }
      .btn-primary:active { transform: translateY(0); }
      .btn-ghost {
        padding: 12px 22px;
        border-radius: 9999px;
        background: rgba(255,255,255,0.55);
        border: 1px solid var(--glass-border);
        color: #334155;
        font-weight: 500;
        font-size: 14px;
        transition: background 0.15s ease;
      }
      .btn-ghost:hover { background: rgba(255,255,255,0.78); }
      .input-glass {
        width: 100%;
        padding: 14px 18px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.55);
        background: rgba(255,255,255,0.55);
        backdrop-filter: blur(10px);
        font-size: 15px;
      }
      .input-glass::placeholder {
        color: #94a3b8;
        font-weight: 400;
      }
      .chip {
        padding: 9px 18px;
        border-radius: 9999px;
        font-size: 13px;
        font-weight: 500;
        background: rgba(255,255,255,0.5);
        border: 1px solid var(--glass-border);
        color: var(--muted);
        transition: background 0.15s ease;
      }
      .chip:hover { background: rgba(255,255,255,0.75); }
      .map {
        height: clamp(300px, 48vh, 480px);
        width: 100%;
        border-radius: 24px;
        overflow: hidden;
      }
      .hero-title {
        font-weight: 600;
        letter-spacing: -0.035em;
        line-height: 1.15;
      }
      .main-pad { padding-bottom: 5.5rem; }
      @media (min-width: 1024px) {
        .main-pad { padding-bottom: 2rem; }
      }
      .toast-glass {
        backdrop-filter: blur(16px) saturate(150%);
        -webkit-backdrop-filter: blur(16px) saturate(150%);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow-soft);
      }
    </style>
  </head>
  <body class="app">
    <header class="sticky top-0 z-40 px-3 pt-3 pb-1">
      <div class="max-w-6xl mx-auto glass-panel rounded-pill px-5 py-3 flex items-center justify-between gap-3">
        <a href="#/" class="hero-title text-lg text-slate-800 no-underline">Рязанский квест</a>
        <nav class="text-sm flex flex-wrap gap-x-4 gap-y-1 items-center justify-end text-slate-600">
          <a class="hover:text-slate-900 transition-colors no-underline" href="#/">Главная</a>
          <button type="button" class="hover:text-slate-900 transition-colors bg-transparent border-0 cursor-pointer p-0 font-inherit text-sm text-slate-600" data-wip="Подбор рядом">Рядом</button>
          <a class="hover:text-slate-900 transition-colors no-underline" href="#/profile">Профиль</a>
          <a class="hover:text-slate-900 transition-colors no-underline" href="#/login" id="navLogin">Вход</a>
          <button type="button" class="hover:text-slate-900 transition-colors hidden bg-transparent border-0 cursor-pointer p-0 font-inherit text-sm text-slate-600" id="navLogout">Выход</button>
        </nav>
      </div>
    </header>

    <main id="app" class="max-w-6xl mx-auto px-3 py-4 main-pad"></main>

    <nav class="lg:hidden fixed bottom-0 left-0 right-0 z-50 flex justify-center pointer-events-none pb-safe">
      <div class="pointer-events-auto glass-panel-strong rounded-pill mx-3 mb-4 flex justify-around items-center gap-1 px-2 py-2.5 w-full max-w-md shadow-lg">
        <a href="#/" class="flex flex-col items-center gap-0.5 text-[11px] text-slate-600 no-underline min-w-[3.5rem] py-1 rounded-pill hover:bg-white/40 transition-colors">
          <span class="text-base leading-none opacity-80">⌂</span>
          <span>Главная</span>
        </a>
        <button type="button" data-wip="Мои маршруты" class="flex flex-col items-center gap-0.5 text-[11px] text-slate-600 min-w-[3.5rem] py-1 rounded-pill hover:bg-white/40 transition-colors bg-transparent border-0 cursor-pointer font-inherit">
          <span class="text-base leading-none opacity-80">◇</span>
          <span>Маршруты</span>
        </button>
        <button type="button" data-wip="Избранное" class="flex flex-col items-center gap-0.5 text-[11px] text-slate-600 min-w-[3.5rem] py-1 rounded-pill hover:bg-white/40 transition-colors bg-transparent border-0 cursor-pointer font-inherit">
          <span class="text-base leading-none opacity-80">♡</span>
          <span>Избранное</span>
        </button>
        <button type="button" data-wip="Голосовой гид" class="flex flex-col items-center gap-0.5 text-[11px] text-slate-600 min-w-[3.5rem] py-1 rounded-pill hover:bg-white/40 transition-colors bg-transparent border-0 cursor-pointer font-inherit">
          <span class="text-base leading-none opacity-80">◉</span>
          <span>Гид</span>
        </button>
        <a href="#/profile" class="flex flex-col items-center gap-0.5 text-[11px] text-slate-600 no-underline min-w-[3.5rem] py-1 rounded-pill hover:bg-white/40 transition-colors">
          <span class="text-base leading-none opacity-80">◐</span>
          <span>Профиль</span>
        </a>
      </div>
    </nav>

    <div id="dlg" class="fixed inset-0 hidden items-center justify-center p-4 z-[60] bg-slate-900/35 backdrop-blur-sm">
      <div class="glass-panel-strong rounded-card w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto">
        <div class="flex items-center justify-between gap-2">
          <div class="hero-title text-lg text-slate-800" id="dlgTitle">Окно</div>
          <button type="button" class="btn-ghost text-sm !py-2 !px-4" id="dlgClose">Закрыть</button>
        </div>
        <div class="mt-4 space-y-3 text-slate-600" id="dlgBody"></div>
      </div>
    </div>

    <script>
      let cfg = { twogisKey: '' };
      const api = {
        async get(path) {
          const token = localStorage.getItem('token');
          const res = await fetch(path, { headers: token ? { 'x-auth-token': token } : {} });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw data;
          return data;
        },
        async post(path, body) {
          const token = localStorage.getItem('token');
          const res = await fetch(path, {
            method: 'POST',
            headers: Object.assign({ 'Content-Type': 'application/json' }, token ? { 'x-auth-token': token } : {}),
            body: JSON.stringify(body || {})
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw data;
          return data;
        }
      };

      const state = {
        user: null,
        routes: [],
        points: [],
        stops: [],
        selectedRoute: null,
        map: null,
        polyline: null,
        markers: [],
        userMarker: null,
        watchId: null,
        routeStats: { meters: 0, seconds: 0, source: '' },
        placedStops: []
      };

      const el = (html) => {
        const t = document.createElement('template');
        t.innerHTML = html.trim();
        return t.content.firstElementChild;
      };

      const toast = (msg, type='info') => {
        let cls = 'text-slate-800 bg-white/82';
        if (type === 'error') cls = 'text-rose-900 bg-rose-50/90';
        if (type === 'success') cls = 'text-emerald-900 bg-emerald-50/90';
        const box = el(`<div class="fixed bottom-24 lg:bottom-5 right-4 z-[55] px-5 py-3.5 rounded-pill text-sm font-medium toast-glass ${cls}">${msg}</div>`);
        document.body.appendChild(box);
        setTimeout(() => box.remove(), 2800);
      };

      function showWip(name) {
        const label = name || 'Этот раздел';
        dlg.open('В разработке', [
          el(`<p class="text-sm leading-relaxed text-slate-600">${label} находится в разработке. Скоро здесь появится полный функционал.</p>`),
          el('<button type="button" class="btn-primary w-full text-center" id="wipOk">Понятно</button>')
        ]);
        document.getElementById('wipOk').onclick = () => dlg.close();
      }
      document.addEventListener('click', (e) => {
        const t = e.target.closest('[data-wip]');
        if (!t) return;
        e.preventDefault();
        e.stopPropagation();
        showWip(t.getAttribute('data-wip') || '');
      });

      const dlg = {
        open(title, nodes) {
          document.getElementById('dlgTitle').textContent = title;
          const b = document.getElementById('dlgBody');
          b.innerHTML = '';
          nodes.forEach(n => b.appendChild(n));
          const m = document.getElementById('dlg');
          m.classList.remove('hidden');
          m.classList.add('flex');
        },
        close() {
          const m = document.getElementById('dlg');
          m.classList.add('hidden');
          m.classList.remove('flex');
        }
      };
      document.getElementById('dlgClose').addEventListener('click', dlg.close);
      document.getElementById('dlg').addEventListener('click', (e) => { if (e.target.id === 'dlg') dlg.close(); });

      async function loadConfig() {
        try { cfg = await api.get('/api/config'); } catch (e) { cfg = { twogisKey: '' }; }
      }

      const setNavAuth = () => {
        const login = document.getElementById('navLogin');
        const logout = document.getElementById('navLogout');
        if (localStorage.getItem('token')) {
          login.classList.add('hidden');
          logout.classList.remove('hidden');
        } else {
          login.classList.remove('hidden');
          logout.classList.add('hidden');
        }
      };

      document.getElementById('navLogout').addEventListener('click', () => {
        localStorage.removeItem('token');
        state.user = null;
        setNavAuth();
        location.hash = '#/login';
        toast('Вы вышли', 'success');
      });

      async function fetchUser() {
        try { state.user = await api.get('/api/users/me'); } catch (e) {
          state.user = null;
          localStorage.removeItem('token');
        }
        setNavAuth();
      }

      async function loadCoreData() {
        try {
          const [points, routes, stops] = await Promise.all([
            api.get('/api/points'),
            api.get('/api/routes'),
            api.get('/api/stops')
          ]);
          state.points = points;
          state.routes = routes;
          state.stops = stops;
          localStorage.setItem('offline_points', JSON.stringify(points));
          localStorage.setItem('offline_routes', JSON.stringify(routes));
          localStorage.setItem('offline_stops', JSON.stringify(stops));
        } catch (e) {
          state.points = JSON.parse(localStorage.getItem('offline_points') || '[]');
          state.routes = JSON.parse(localStorage.getItem('offline_routes') || '[]');
          state.stops = JSON.parse(localStorage.getItem('offline_stops') || '[]');
        }
      }

      function sortedRoutePoints(route) {
        return (route?.points || []).slice().sort((a,b) => (a.order||0) - (b.order||0));
      }

      function getScannedPointIds() {
        return (state.user?.scannedPoints || []).map(p => p._id);
      }

      function destroyMapGl() {
        if (state.watchId != null) {
          navigator.geolocation.clearWatch(state.watchId);
          state.watchId = null;
        }
        state.markers.forEach(m => { if (m && m.destroy) m.destroy(); });
        state.markers = [];
        if (state.polyline && state.polyline.destroy) state.polyline.destroy();
        state.polyline = null;
        if (state.userMarker && state.userMarker.destroy) state.userMarker.destroy();
        state.userMarker = null;
        if (state.map && state.map.destroy) state.map.destroy();
        state.map = null;
      }

      function buildWaypointsFromRoute(route) {
        const pts = sortedRoutePoints(route);
        if (!pts.length) return [];
        const wp = [{ lng: pts[0].lng, lat: pts[0].lat, kind: 'poi', ref: pts[0] }];
        for (let i = 0; i < pts.length - 1; i++) {
          const extras = state.placedStops.filter(x => x.afterIndex === i).map(x => x.stop);
          extras.forEach(s => wp.push({ lng: s.lng, lat: s.lat, kind: 'stop', ref: s }));
          wp.push({ lng: pts[i+1].lng, lat: pts[i+1].lat, kind: 'poi', ref: pts[i+1] });
        }
        return wp;
      }

      async function updatePedestrianRoute() {
        if (!state.map || !state.selectedRoute) return;
        const w = buildWaypointsFromRoute(state.selectedRoute);
        const seq = w.map(p => ({ lng: p.lng, lat: p.lat }));
        let data = { coordinates: [], total_distance_m: 0, total_duration_s: 0, source: '', error: null };
        try {
          if (seq.length >= 2) data = await api.post('/api/routing/pedestrian', { waypoints: seq });
        } catch (e) {
          data = { coordinates: seq.map(p => [p.lng, p.lat]), total_distance_m: 0, total_duration_s: 0, source: 'local', error: e };
        }
        state.routeStats = {
          meters: data.total_distance_m || 0,
          seconds: data.total_duration_s || 0,
          source: data.source || ''
        };
        const coords = data.coordinates || [];
        if (state.polyline) { state.polyline.destroy(); state.polyline = null; }
        if (coords.length >= 2 && window.mapgl && mapgl.Polyline) {
          try {
            state.polyline = new mapgl.Polyline(state.map, {
              coordinates: coords,
              color: '#5a7d92',
              width: 5
            });
          } catch (e) {
            console.warn('Polyline', e);
          }
        }
        const statEl = document.getElementById('routeStats');
        if (statEl) {
          const km = (state.routeStats.meters / 1000).toFixed(2);
          const min = Math.round(state.routeStats.seconds / 60);
          statEl.textContent = `Ориентир: ${km} км пешком, ~${min} мин (данные 2ГИС). Источник: ${state.routeStats.source || '—'}${data.error ? ', резерв' : ''}`;
        }
      }

      function drawMarkers() {
        state.markers.forEach(m => { if (m && m.destroy) m.destroy(); });
        state.markers = [];
        if (!state.map || !state.selectedRoute) return;
        const scanned = new Set(getScannedPointIds());
        sortedRoutePoints(state.selectedRoute).forEach((p) => {
          const isDone = scanned.has(p._id);
          const color = isDone ? '#16a34a' : '#dc2626';
          const html = `<button type="button" style="width:16px;height:16px;border-radius:9999px;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35);cursor:pointer;padding:0" data-p="${p._id}" class="rq-m"></button>`;
          const marker = new mapgl.HtmlMarker(state.map, { coordinates: [p.lng, p.lat], html });
          state.markers.push(marker);
        });
        state.placedStops.forEach((ps) => {
          const s = ps.stop;
          const sid = (s._id || '').replace(/"/g, '');
          const html = `<button type="button" class="rq-s" data-sn="${sid}" style="padding:2px 6px;font-size:10px;border-radius:6px;background:#7c3aed;color:#fff;border:0;cursor:pointer">${(s.name || '').slice(0, 14)}</button>`;
          const m = new mapgl.HtmlMarker(state.map, { coordinates: [s.lng, s.lat], html });
          state.markers.push(m);
        });
      }
      window.addEventListener('click', (e) => {
        const t = e.target;
        if (!t || !t.classList) return;
        if (t.classList.contains('rq-m')) {
          const id = t.getAttribute('data-p');
          if (id) openPointSheet(id);
        }
        if (t.classList.contains('rq-s')) {
          const sid = t.getAttribute('data-sn');
          const s = state.stops.find(x => x._id === sid) || state.placedStops.map(x => x.stop).find(x => x._id === sid);
          if (s) dlg.open(s.name, [el(`<div class="text-sm text-slate-600">${s.address || ''}</div>`)]);
        }
      });

      function initMapIfNeeded(containerEl) {
        if (!window.mapgl) return;
        if (!cfg.twogisKey) {
          loadConfig().then(() => initMapIfNeeded(containerEl));
          return;
        }
        destroyMapGl();
        state.map = new mapgl.Map(containerEl, {
          key: cfg.twogisKey,
          center: [39.742, 54.629],
          zoom: 14
        });
        drawMarkers();
        updatePedestrianRoute().then(() => {});

        const locBtn = document.getElementById('btnLocate');
        if (locBtn) {
          locBtn.onclick = () => {
            if (!navigator.geolocation) return toast('Геолокация недоступна', 'error');
            if (state.watchId != null) {
              navigator.geolocation.clearWatch(state.watchId);
              state.watchId = null;
              if (state.userMarker) { state.userMarker.destroy(); state.userMarker = null; }
              locBtn.textContent = 'Показать моё положение';
              return;
            }
            locBtn.textContent = 'Скрыть отслеживание';
            state.watchId = navigator.geolocation.watchPosition((pos) => {
              const lng = pos.coords.longitude, lat = pos.coords.latitude;
              if (!state.userMarker) {
                state.userMarker = new mapgl.Marker(state.map, { coordinates: [lng, lat] });
              } else {
                state.userMarker.setCoordinates([lng, lat]);
              }
            }, () => toast('Не удалось получить координаты', 'error'), { enableHighAccuracy: true, maximumAge: 10000 });
          };
        }
      }

      function openPointSheet(pointId) {
        const p = state.points.find(x => x._id === pointId) || (state.selectedRoute?.points || []).find(x => x._id === pointId);
        if (!p) return;
        const nodes = [el(`<div class="text-sm text-slate-600 leading-relaxed">${p.description || ''}</div>`), el(`<button type="button" class="btn-primary w-full text-sm !py-3" id="btnOpenGuide">Открыть материалы гида</button>`)];
        dlg.open(p.name, nodes);
        document.getElementById('btnOpenGuide').onclick = () => { dlg.close(); openGuideForPoint(p, false); };
      }

      function openGuideForPoint(p, afterScan) {
        const wrap = el('<div class="space-y-3"></div>');
        if (p.guideText) wrap.appendChild(el(`<div class="text-sm text-slate-800 whitespace-pre-wrap">${p.guideText}</div>`));
        if (p.guideAudioUrl) {
          wrap.appendChild(el(`<audio controls class="w-full" src="${p.guideAudioUrl}">Ваш браузер не поддерживает audio</audio>`));
        }
        if (!p.guideText && !p.guideAudioUrl) wrap.appendChild(el('<div class="text-sm text-slate-600">Текст гида будет добавлен.</div>'));
        if (afterScan && p.quiz) {
          const b = el('<button type="button" class="btn-primary w-full text-sm !py-3">Перейти к мини-тесту</button>');
          b.onclick = () => { dlg.close(); offerQuiz(p); };
          wrap.appendChild(b);
        }
        dlg.open('Гид: ' + p.name, [wrap]);
      }

      function offerQuiz(p) {
        if (!p.quiz) return;
        const q = p.quiz;
        const box = el('<div class="space-y-2"></div>');
        box.appendChild(el(`<div class="text-sm font-medium">${q.question}</div>`));
        q.options.forEach((opt, i) => {
          const b = el(`<button type="button" class="w-full text-left text-sm input-glass hover:bg-white/75 py-3.5">${opt}</button>`);
          b.onclick = async () => {
            try {
              const r = await api.post('/api/quiz/point', { pointId: p._id, choiceIndex: i });
              if (r.already) toast('Тест по точке уже сдан', 'success');
              else if (r.success) toast('Верно. Начислено: ' + r.reward, 'success');
              else toast('Неверно, баллы не начислены', 'error');
              await fetchUser();
              dlg.close();
            } catch (e) { toast(e.msg || 'Ошибка теста', 'error'); }
          };
          box.appendChild(b);
        });
        dlg.open('Мини-тест после точки', [box]);
      }

      function offerFinalTest(route) {
        const ft = route.finalTest;
        if (!ft) return;
        const box = el('<div class="space-y-2"></div>');
        box.appendChild(el(`<div class="text-sm">${ft.question}</div>`));
        box.appendChild(el('<div class="text-xs text-slate-500">Можно закрыть окно — баллы за финальный тест не будут начислены.</div>'));
        ft.options.forEach((opt, i) => {
          const b = el(`<button type="button" class="w-full text-left text-sm input-glass hover:bg-white/75 py-3.5">${opt}</button>`);
          b.onclick = async () => {
            try {
              const r = await api.post('/api/quiz/final', { routeId: route._id, choiceIndex: i });
              if (r.already) toast('Финальный тест уже сдан', 'success');
              else if (r.success) toast('Верно. Начислено: ' + r.reward, 'success');

              return `<li class="py-3 flex items-center justify-between gap-2 border-b border-white/40 last:border-0"><span class="flex items-center gap-3">${img}<span class="text-slate-700 font-medium">${i+1}. ${x.name}</span></span><span class="font-semibold text-slate-800 tabular-nums">${x.balance}</span></li>`;
            }).join('') + '</ul>';
          }).catch(() => { lb.querySelector('#lb').textContent = 'Недоступно офлайн'; });

          const shop = el('<div class="glass-panel rounded-card p-5"><div class="hero-title text-lg text-slate-800 mb-3">Магазин купонов</div><div id="shop" class="text-sm text-slate-600"></div><button type="button" class="btn-ghost w-full mt-4 text-xs" data-wip="История покупок">История покупок</button></div>');
          right.appendChild(shop);
          api.get('/api/rewards').then((items) => {
            shop.querySelector('#shop').innerHTML = '<div class="space-y-3">' + items.map(rw => `
              <div class="glass-panel rounded-card p-4 flex items-center justify-between gap-3">
                <div class="min-w-0">
                  <div class="font-medium text-slate-800">${rw.name}</div>
                  <div class="text-sm text-slate-500 font-light mt-0.5">${rw.description}</div>
                  <div class="text-[11px] text-slate-400 mt-1">${rw.partnerName || ''}</div>
                </div>
                <button type="button" data-buy="${rw._id}" class="btn-primary text-sm !py-2 !px-4 shrink-0">${rw.cost} б.</button>
              </div>
            `).join('') + '</div>';
            shop.querySelectorAll('[data-buy]').forEach(btn => {
              btn.onclick = async () => {
                try {
                  const res = await api.post('/api/rewards/purchase', { rewardId: btn.getAttribute('data-buy') });
                  toast('Промокод: ' + res.promoCode, 'success');
                  await fetchUser();
                  renderRight();
                } catch (e) { toast(e.msg || 'Ошибка', 'error'); }
              };
            });
          }).catch(() => { shop.querySelector('#shop').textContent = 'Недоступно офлайн'; });
        }

        renderRight();
        window.__refreshHome = renderRight;

        const mapNode = left.querySelector('#map');
        const tryMap = () => {
          if (window.mapgl && cfg.twogisKey) { initMapIfNeeded(mapNode); return; }
          setTimeout(tryMap, 200);
        };
        tryMap();
      }

      function route() {
        const hash = location.hash.replace('#','') || '/';
        const token = localStorage.getItem('token');
        if ((hash === '/' || hash === '') && !token) return renderLogin();
        if (hash === '/login') return renderLogin();
        if (hash === '/register') return renderRegister();
        if (hash === '/profile') return renderProfile();
        return renderHome();
      }

      window.addEventListener('hashchange', () => { destroyMapGl(); route(); });
      (async () => {
        await loadConfig();
        setNavAuth();
        await fetchUser();
        route();
      })();
    </script>
  </body>
</html>
